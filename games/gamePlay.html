<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tic Tac Toe</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <div class="bg-grid"></div>

    <h1>Tic Tac Toe</h1>

    <div class="scoreboard">
        <div class="score-box x">
            <span class="score-label">PLAYER X</span>
            <span class="score-value" id="score-x">0</span>
        </div>
        <div class="score-box ties">
            <span class="score-label">TIES</span>
            <span class="score-value" id="score-ties">0</span>
        </div>
        <div class="score-box o">
            <span class="score-label">PLAYER O</span>
            <span class="score-value" id="score-o">0</span>
        </div>
    </div>

    <div class="turn-indicator" id="turn-indicator">
        TURN: <span class="display-player playerX" id="display-player">X</span>
    </div>

    <main class="board" id="board">
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
        <div class="tile"></div>
    </main>

    <div class="controls">
        <button id="reset">Reset Game</button>
    </div>

    <!-- Game Over Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="announcer" id="announcer"></div>
            <button class="modal-btn" id="play-again">Play Again</button>
        </div>
    </div>

    <script src="./assets/js/script.js"></script>
</body>

</html>
